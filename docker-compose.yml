services:
  control-plane:
    image: ${CONTAINER_REGISTRY:-ghcr.io}/zanel1u/cloud-cli-proxy/control-plane:latest
    pull_policy: always
    restart: unless-stopped
    environment:
      DATABASE_URL: file:/data/cloud-cli-proxy.db?_texttotime=true
      CONTROL_PLANE_ADDR: ":8080"
      HOST_AGENT_MODE: embedded
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:?Set ADMIN_JWT_SECRET in .env}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SKIP_EGRESS_VERIFY: ${SKIP_EGRESS_VERIFY:-}
      CONTAINER_REGISTRY: ${CONTAINER_REGISTRY:-}
    ports:
      - "${SSH_PROXY_PORT:-2222}:2222"
      - "8080:8080"
    pid: host
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/cloud-cli-proxy:/var/lib/cloud-cli-proxy
      - cloud-cli-proxy-data:/data
    healthcheck:
      test: ["CMD-SHELL", "port=$${CONTROL_PLANE_ADDR:-:8080}; port=$${port##*:}; curl -sf http://127.0.0.1:$${port}/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  cloud-cli-proxy-data:
